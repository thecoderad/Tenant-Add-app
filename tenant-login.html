<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Login - TenantHub</title>
    <link rel="stylesheet" href="/global-styles.css">
    <link rel="stylesheet" href="/login-styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tenant-info { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--border-radius-md); padding: var(--spacing-lg); margin-bottom: var(--spacing-lg); text-align: center; }
        .tenant-info-icon { font-size: 4rem; color: var(--neon-cyan); margin-bottom: var(--spacing-md); }
        .tenant-info h2 { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: var(--spacing-sm); }
        .business-badge { display: inline-block; padding: 6px 16px; background: var(--gradient-primary); border-radius: 20px; font-size: 0.85rem; color: var(--bg-primary); font-weight: 600; margin: 10px 0; }
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .feature-item { background: var(--bg-tertiary); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.85rem; color: var(--text-secondary); }
        .feature-item i { display: block; font-size: 1.5rem; color: var(--neon-cyan); margin-bottom: 5px; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 16px 20px; background: var(--gradient-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow-xl); transform: translateX(120%); transition: transform 0.3s; margin-bottom: 10px; }
        .toast.show { transform: translateX(0); }
        .toast-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .toast-success .toast-icon { background: rgba(0,255,136,0.2); color: var(--neon-green); }
        .toast-error .toast-icon { background: rgba(255,56,96,0.2); color: var(--neon-red); }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" style="position:fixed;top:20px;right:20px;z-index:100;"><span class="icon">🌙</span><span>Dark Mode</span></button>

    <main class="login-page">
        <div class="login-particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>

        <div class="login-container" style="flex-direction:column;">
            <div class="login-brand" style="max-width:100%;text-align:center;">
                <div class="brand-logo animate-float" style="font-size:4rem;"><i class="fas fa-building"></i></div>
                <h1 class="brand-title">TenantHub</h1>
                <p class="brand-subtitle">Business Management Portal</p>
            </div>

            <div class="login-box cyber-border">
                <div id="tenant-lookup" class="tenant-info">
                    <div class="tenant-info-icon"><i class="fas fa-building"></i></div>
                    <h2 id="loading-text">Loading...</h2>
                    <p id="loading-desc">Please wait</p>
                    <div id="business-badge"></div>
                    <div class="feature-grid" id="feature-grid"></div>
                </div>

                <form id="tenant-login-form" class="hidden">
                    <div class="login-header"><h2>Sign In</h2><p>Welcome to <span id="company-name-display">your workspace</span></p></div>
                    <div class="form-group">
                        <label class="form-label">Company</label>
                        <input type="text" id="company-display" class="form-input" readonly style="background:var(--bg-tertiary);">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="tenant-password" class="form-input" placeholder="Enter password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword()"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                    <div class="login-divider" style="margin-top:20px;"><a href="/index.html" style="color:var(--neon-cyan);"><i class="fas fa-arrow-left"></i> Back to Home</a></div>
                </form>

                <div id="error-state" class="hidden" style="text-align:center;padding:40px;">
                    <i class="fas fa-exclamation-triangle" style="font-size:3rem;color:var(--neon-red);margin-bottom:20px;"></i>
                    <h3 style="color:var(--neon-red);">Not Found</h3>
                    <p style="color:var(--text-secondary);">This business login URL is invalid.</p>
                    <a href="/index.html" class="btn btn-primary">Go Home</a>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const API = '/api';
        let tenantSlug = null;
        let tenantData = null;

        const businessIcons = { clinic: 'fa-user-doctor', daycare: 'fa-children', restaurant: 'fa-utensils', retail: 'fa-store', salon: 'fa-scissors', gym: 'fa-dumbbell', office: 'fa-briefcase', school: 'fa-graduation-cap', spa: 'fa-spa', auto: 'fa-car', 'real-estate': 'fa-house', legal: 'fa-scale-balanced', other: 'fa-building' };
        const businessFeatures = { clinic: ['Patients','Appointments','Billing','Records'], daycare: ['Children','Parents','Attendance','Activities'], restaurant: ['Orders','Reservations','Menu','Staff'], retail: ['Products','Customers','Sales','Inventory'], salon: ['Clients','Appointments','Services','Staff'], gym: ['Members','Classes','Trainers','Plans'], office: ['Employees','Tasks','Meetings','Projects'], school: ['Students','Teachers','Classes','Grades'], spa: ['Clients','Appointments','Treatments','Packages'], auto: ['Customers','Vehicles','Services','Bookings'], 'real-estate': ['Properties','Clients','Listings','Contracts'], legal: ['Clients','Cases','Documents','Appointments'], other: ['Customers','Services','Appointments','Reports'] };

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const icons = { success: '✓', error: '✕' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><div class="toast-content">${msg}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.add('hiding'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.querySelector('.theme-toggle .icon');
            const label = document.querySelector('.theme-toggle span:last-child');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme'); icon.textContent = '🌙'; label.textContent = 'Dark Mode';
            } else {
                body.setAttribute('data-theme', 'light'); icon.textContent = '☀️'; label.textContent = 'Light Mode';
            }
        }

        function togglePassword() {
            const input = document.getElementById('tenant-password');
            const icon = input.parentElement.querySelector('i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }

        function switchTab(tab) {
            document.getElementById('admin-form').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tenant-form').classList.toggle('hidden', tab !== 'tenant');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase() === tab));
        }

        async function loadTenantInfo() {
            const slug = window.location.pathname.split('/').pop();
            
            // Handle invalid URLs
            if (!slug || slug === 'tenant-login.html' || slug.includes('.html') || slug === 'login') {
                document.getElementById('loading-text').textContent = 'Invalid URL';
                document.getElementById('loading-desc').innerHTML = 'Redirecting to demo... <span id="countdown">3</span>s';
                let count = 3;
                const timer = setInterval(() => {
                    count--;
                    const el = document.getElementById('countdown');
                    if (el) el.textContent = count;
                    if (count <= 0) { clearInterval(timer); window.location.href = '/login/care-clinic'; }
                }, 1000);
                return;
            }

            tenantSlug = slug;

            try {
                const res = await fetch(`${API}/tenant/slug/${slug}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();

                tenantData = data;
                document.getElementById('loading-text').textContent = data.name;
                document.getElementById('loading-desc').textContent = data.description || 'Welcome to your business portal';
                document.getElementById('company-name-display').textContent = data.name;
                document.getElementById('company-display').value = data.name;

                // Business badge
                const icon = businessIcons[data.businessType] || 'fa-building';
                const type = data.businessType ? data.businessType.charAt(0).toUpperCase() + data.businessType.slice(1) : 'Business';
                document.getElementById('business-badge').innerHTML = `<span class="business-badge"><i class="fas ${icon}"></i> ${type}</span>`;

                // Features
                const features = businessFeatures[data.businessType] || businessFeatures.other;
                document.getElementById('feature-grid').innerHTML = features.map(f => `<div class="feature-item"><i class="fas ${f.toLowerCase().includes('appoint')?'fa-calendar':f.toLowerCase().includes('customer')||f.toLowerCase().includes('patient')||f.toLowerCase().includes('client')?'fa-users':'fa-chart-line'}"></i>${f}</div>`).join('');

                setTimeout(() => {
                    document.getElementById('tenant-lookup').classList.add('hidden');
                    document.getElementById('tenant-login-form').classList.remove('hidden');
                    document.getElementById('tenant-password').focus();
                }, 1000);

            } catch (err) {
                document.getElementById('loading-text').textContent = 'Error';
                document.getElementById('loading-desc').textContent = 'Business not found or server error';
                setTimeout(() => {
                    document.getElementById('tenant-lookup').classList.add('hidden');
                    document.getElementById('error-state').classList.remove('hidden');
                }, 2000);
            }
        }

        document.getElementById('tenant-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/login/tenant-slug`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug: tenantSlug, password: document.getElementById('tenant-password').value })
                });
                const data = await res.json();

                if (data.success) {
                    sessionStorage.setItem('tenanthub_user', JSON.stringify({ role: 'tenant', email: data.tenant.email }));
                    sessionStorage.setItem('current_tenant', JSON.stringify(data.tenant));
                    showToast('Welcome! Redirecting...', 'success');
                    setTimeout(() => {
                        console.log('Redirecting to tenant.html');
                        window.location.href = '/tenant.html';
                    }, 1000);
                } else {
                    showToast(data.error || 'Invalid credentials', 'error');
                    btn.innerHTML = 'Sign In';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Server error: ' + err.message, 'error');
                btn.innerHTML = 'Sign In';
                btn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', loadTenantInfo);
    </script>
</body>
</html>
