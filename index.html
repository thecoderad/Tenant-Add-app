<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TenantHub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login-styles.css">
</head>
<body>
    <div class="login-container">
        <!-- Theme Toggle -->
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <span class="icon" id="themeIcon">🌙</span>
            <span id="themeText">Dark</span>
        </button>

        <div class="login-box">
            <div class="login-header">
                <h1>🏢 TenantHub</h1>
                <p>Sign in to your account</p>
            </div>

            <!-- Login Tabs -->
            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchTab('admin')">Admin</button>
                <button class="tab-btn" onclick="switchTab('tenant')">Tenant</button>
            </div>

            <!-- Admin Login Form -->
            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" id="adminEmail" value="admin@tenanthub.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="adminPassword" value="admin123" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('adminPassword')">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C1.448 7 5 5 12 5c7.336 0 11.573 3 12.458 7"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign in as Admin</button>
            </form>

            <!-- Tenant Login Form -->
            <form id="tenantLoginForm" class="login-form hidden">
                <div class="form-group">
                    <label>Tenant Email</label>
                    <input type="email" id="tenantEmail" placeholder="admin@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="tenantPassword" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('tenantPassword')">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C1.448 7 5 5 12 5c7.336 0 11.573 3 12.458 7"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign in as Tenant</button>
            </form>

            <div class="login-footer">
                <p class="demo-credentials">
                    <strong>Demo Credentials:</strong><br>
                    Admin: admin@tenanthub.com / admin123<br><br>
                    Tenants: See admin dashboard for credentials
                </p>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="login.js"></script>
</body>
</html>
