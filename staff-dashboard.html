<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - TenantHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global-styles.css">
    <link rel="stylesheet" href="/theme-enhanced.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            color: var(--gray-900);
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
            top: -250px;
            right: -250px;
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--gray-200);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
            background: linear-gradient(135deg, var(--secondary-light) 0%, transparent 100%);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--gradient-secondary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
        }
        .brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gray-900);
        }
        .brand-subtitle {
            font-size: 0.7rem;
            color: var(--gray-500);
        }
        .sidebar-nav {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-400);
            margin-bottom: 10px;
            padding-left: 12px;
        }
        .nav-list { list-style: none; }
        .nav-item { margin-bottom: 4px; }
        .nav-link {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-600);
        }
        .nav-link:hover {
            background: var(--gray-100);
            color: var(--primary);
            transform: translateX(4px);
        }
        .nav-link.active {
            background: var(--primary-light);
            color: var(--primary);
        }
        .nav-icon {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--gray-200);
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--gray-50);
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .user-avatar {
            width: 38px;
            height: 38px;
            background: var(--gradient-secondary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .user-info { flex: 1; min-width: 0; }
        .user-name {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--gray-900);
        }
        .user-role {
            font-size: 0.7rem;
            color: var(--gray-500);
        }
        .btn-logout {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: transparent;
            border: 2px solid var(--danger-light);
            color: var(--danger);
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }
        .btn-logout:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
        }
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
        }
        .header {
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-900);
        }
        .content {
            padding: 28px;
        }
        .welcome-banner {
            background: var(--gradient-secondary);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 28px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .welcome-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 14px;
            color: white;
        }
        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--gray-900);
        }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
        }
        .card-content { padding: 20px; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }
        .btn-sm { padding: 8px 14px; font-size: 0.8rem; }
        .task-card {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-flex;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge.active { background: var(--success-light); color: var(--success); }
        .badge.pending { background: var(--warning-light); color: var(--warning); }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <button class="theme-toggle" onclick="toggleTheme()">
        <span class="icon">🌙</span>
        <span>Dark Mode</span>
    </button>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-logo" id="brand-logo">
                    <i class="fas fa-building"></i>
                </div>
                <div>
                    <div class="brand-name" id="brand-name">Your Business</div>
                    <div class="brand-subtitle">Staff Portal</div>
                </div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-label">Main</div>
                <ul class="nav-list">
                    <li class="nav-item">
                        <button class="nav-link active" onclick="showSection('dashboard', this)">
                            <span class="nav-icon"><i class="fas fa-th-large"></i></span>
                            <span>Dashboard</span>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" onclick="showSection('tasks', this)">
                            <span class="nav-icon"><i class="fas fa-tasks"></i></span>
                            <span>My Tasks</span>
                        </button>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="user-avatar">S</div>
                <div class="user-info">
                    <div class="user-name" id="user-name">Staff Member</div>
                    <div class="user-role" id="user-role">Team Member</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title" id="page-title">Dashboard</h1>
        </header>

        <div class="content">
            <div class="welcome-banner">
                <h2 class="welcome-title" id="welcome-title">Welcome!</h2>
                <p>Here's your work overview for today.</p>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--gradient-success);"><i class="fas fa-tasks"></i></div>
                    <div class="stat-label">My Tasks</div>
                    <div class="stat-value" id="stat-tasks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--gradient-primary);"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-label">Completed</div>
                    <div class="stat-value" id="stat-completed">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: var(--gradient-warning);"><i class="fas fa-clock"></i></div>
                    <div class="stat-label">Pending</div>
                    <div class="stat-value" id="stat-pending">0</div>
                </div>
            </div>

            <div id="dashboard-section" class="section-content active">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-tasks"></i> My Tasks</h3>
                    </div>
                    <div class="card-content" id="tasks-list"></div>
                </div>
            </div>

            <div id="tasks-section" class="section-content">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-list"></i> All Tasks</h3>
                        <button class="btn btn-primary btn-sm" onclick="renderTasks()">
                            <i class="fas fa-sync"></i> Refresh
                        </button>
                    </div>
                    <div class="card-content" id="all-tasks-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = '/api';
        let tenantData = null;
        let staffData = null;
        let tasksList = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadStaffSession();
        });

        function loadStaffSession() {
            const stored = sessionStorage.getItem('tenanthub_user');
            const tenant = sessionStorage.getItem('current_tenant');

            if (!stored || !tenant) {
                window.location.href = '/index.html';
                return;
            }

            const userData = JSON.parse(stored);
            if (userData.role !== 'staff') {
                window.location.href = '/index.html';
                return;
            }

            staffData = userData;
            tenantData = JSON.parse(tenant);

            document.getElementById('brand-name').textContent = tenantData.name;
            document.getElementById('user-name').textContent = staffData.name || 'Staff Member';
            document.getElementById('user-role').textContent = staffData.role || 'Team Member';
            document.getElementById('user-avatar').textContent = (staffData.name || 'S').charAt(0).toUpperCase();

            loadTasks();
            updateGreeting();
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
            document.getElementById('welcome-title').textContent = `${greeting}, ${staffData?.name?.split(' ')[0] || 'Team Member'}!`;
        }

        function loadTasks() {
            const stored = localStorage.getItem(`tasks_${tenantData?.id}`);
            if (stored) {
                tasksList = JSON.parse(stored);
            } else {
                tasksList = [
                    { id: 1, title: 'Complete weekly report', description: 'Submit the weekly progress report', status: 'pending', priority: 'high', dueDate: new Date().toISOString().split('T')[0], assignedTo: staffData.name, created: new Date().toISOString() },
                    { id: 2, title: 'Team meeting preparation', description: 'Prepare slides for Monday meeting', status: 'pending', priority: 'medium', dueDate: new Date(Date.now() + 86400000 * 2).toISOString().split('T')[0], assignedTo: staffData.name, created: new Date().toISOString() },
                    { id: 3, title: 'Client follow-up', description: 'Call client about project update', status: 'completed', priority: 'high', dueDate: new Date().toISOString().split('T')[0], assignedTo: staffData.name, created: new Date().toISOString() }
                ];
            }
            renderTasks();
            updateStats();
        }

        function updateStats() {
            const myTasks = tasksList.filter(t => t.assignedTo === staffData.name);
            document.getElementById('stat-tasks').textContent = myTasks.length;
            document.getElementById('stat-completed').textContent = myTasks.filter(t => t.status === 'completed').length;
            document.getElementById('stat-pending').textContent = myTasks.filter(t => t.status === 'pending').length;
        }

        function renderTasks() {
            const myTasks = tasksList.filter(t => t.assignedTo === staffData.name);
            const container = document.getElementById('tasks-list');
            const allContainer = document.getElementById('all-tasks-list');

            if (myTasks.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px; color: var(--text-muted);">No tasks assigned to you</p>';
            } else {
                container.innerHTML = myTasks.map(task => `
                    <div class="task-card" style="border-left-color: ${task.priority === 'high' ? 'var(--danger)' : task.priority === 'medium' ? 'var(--warning)' : 'var(--success)'};">
                        <div class="task-header">
                            <h4 style="margin: 0; font-size: 1rem;">${task.title}</h4>
                            <span class="badge badge-${task.status === 'completed' ? 'active' : 'pending'}">${task.status}</span>
                        </div>
                        <p style="margin: 8px 0; font-size: 0.875rem; color: var(--text-secondary);">${task.description || ''}</p>
                        <div style="display: flex; gap: 12px; font-size: 0.8rem; color: var(--text-muted);">
                            <span><i class="fas fa-calendar"></i> Due: ${task.dueDate}</span>
                            <span><i class="fas fa-flag" style="color: ${task.priority === 'high' ? 'var(--danger)' : task.priority === 'medium' ? 'var(--warning)' : 'var(--success)'};"></i> ${task.priority}</span>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="toggleTaskStatus(${task.id})" style="margin-top: 12px;">
                            <i class="fas fa-${task.status === 'pending' ? 'check' : 'undo'}"></i> ${task.status === 'pending' ? 'Mark Complete' : 'Reopen'}
                        </button>
                    </div>
                `).join('');
            }

            if (allContainer) {
                allContainer.innerHTML = tasksList.map(task => `
                    <div class="task-card" style="border-left-color: ${task.priority === 'high' ? 'var(--danger)' : task.priority === 'medium' ? 'var(--warning)' : 'var(--success)'};">
                        <div class="task-header">
                            <h4 style="margin: 0; font-size: 1rem;">${task.title}</h4>
                            <span class="badge badge-${task.status === 'completed' ? 'active' : 'pending'}">${task.status}</span>
                        </div>
                        <p style="margin: 8px 0; font-size: 0.875rem; color: var(--text-secondary);">${task.description || ''}</p>
                        <div style="display: flex; gap: 12px; font-size: 0.8rem; color: var(--text-muted);">
                            <span><i class="fas fa-user"></i> ${task.assignedTo || 'Unassigned'}</span>
                            <span><i class="fas fa-calendar"></i> Due: ${task.dueDate}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function toggleTaskStatus(id) {
            const task = tasksList.find(t => t.id === id);
            if (task) {
                task.status = task.status === 'pending' ? 'completed' : 'pending';
                localStorage.setItem(`tasks_${tenantData.id}`, JSON.stringify(tasksList));
                renderTasks();
                updateStats();
            }
        }

        function showSection(section, navElement) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if (navElement) navElement.classList.add('active');

            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById(section + '-section').classList.add('active');

            document.getElementById('page-title').textContent = section === 'dashboard' ? 'Dashboard' : 'My Tasks';
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.querySelector('.theme-toggle .icon');
            const label = document.querySelector('.theme-toggle span:last-child');
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';

            if (newTheme === 'light') {
                body.setAttribute('data-theme', 'light');
                icon.textContent = '☀️';
                label.textContent = 'Light Mode';
            } else {
                body.removeAttribute('data-theme');
                icon.textContent = '🌙';
                label.textContent = 'Dark Mode';
            }
            localStorage.setItem('staffDashboardTheme', newTheme);
        }

        function logout() {
            sessionStorage.removeItem('tenanthub_user');
            sessionStorage.removeItem('current_tenant');
            window.location.href = '/index.html';
        }

        // Initialize theme
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('staffDashboardTheme');
            if (savedTheme === 'light') {
                document.body.setAttribute('data-theme', 'light');
                const icon = document.querySelector('.theme-toggle .icon');
                const label = document.querySelector('.theme-toggle span:last-child');
                if (icon) icon.textContent = '☀️';
                if (label) label.textContent = 'Light Mode';
            }
        });
    </script>
</body>
</html>
